# Scans every push/PR for committed secrets (API keys, tokens, setup keys,
# private key material, etc.) before they can land on main. Catches what
# manual review misses — see README's "Only tested commands" banner for the
# broader rule this enforces: no real secrets, hostnames, or device-identifying
# info in this repo, ever, even in README examples.
name: Secrets scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
